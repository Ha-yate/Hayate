<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayate</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <p style="align-content: center;"><h1 style="font-family: 'Times New Roman', Times, serif;"> Hayate's Anthology</h1></p> 
<nav>
    <div class="logo">Hayate</div>
    <ul>
        <li><a href="Hayatex,x.HTML">Home</a></li>
        <li><a href="About.Html">About</a></li> 
        <li><a href="Contact.HTML">Contact</a></li>
    </ul>
</nav>
<section class="page-hero">
    <p>The Poet</p>
    <h1>Reach Out</h1>
</section>

<section class="contact-body">
    <div class="contact-grid">
  
      <div class="contact-left">
        <p class="contact-intro">
            The poem ended. The feeling didn't. Tell me about it.
        </p>
      </div>
      <div class="contact-note">
        <p>Every message is a conversation I didn't know I needed.</p>
        <span>~ Hayate</span>
      </div>
    </div>
    <div class="contact-right">
        <form action="https://formspree.io/f/mzdwqolw" method="POST">
      
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" placeholder="What do they call you?" required />
          </div>
      
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />
          </div>
      
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What's on your mind?" />
          </div>
      
          <div class="form-group">
            <label for="poem">Which Poem?</label>
            <select id="poem" name="poem">
              <option value="">-- Select a Poem --</option>
              <option value="Caged Birds">Caged Birds</option>
              <option value="Trapped In My Mind">Trapped In My Mind</option>
              <option value="My Sin">My Sin</option>
              <option value="Beautifully Broken">Beautifully Broken</option>
              <option value="Promise">Promise</option>
              <option value="What IF?">What IF?</option>
            </select>
          </div>
      
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Say it here..." required></textarea>
          </div>
      
          <button type="submit" class="btn">Send Message</button>
      
        </form>
      </div>   
  
    
  </section>

  <footer>
    <p>© 2025 Hatyate. All rights reserved.</p>
    <div>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </footer>
  <script>
    function handleSubmit() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      const feedback = document.getElementById('form-feedback');
  
      if (!name || !email || !message) {
        feedback.textContent = "Please fill in all required fields.";
        feedback.style.color = "#c0392b";
        return;
      }
  
      feedback.textContent = "Message sent. Thank you for reaching out.";
      feedback.style.color = "var(--accent)";
    }
  </script>

</body>
</html>
